<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KickStream - O Melhor do Futebol Nacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1350.0.min.js"></script>
    <style>
        body { background-color: #141414; color: #ffffff; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 bg-[#141414]/95 border-b border-zinc-800 backdrop-blur-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-8">
            <span class="text-3xl font-extrabold tracking-wider text-red-600">KICKSTREAM</span>
            <nav class="hidden md:flex space-x-6 text-sm font-medium text-zinc-300">
                <a href="index.html" class="text-white hover:text-red-500 transition">Início</a>
                <a href="sobre.html" class="hover:text-red-500 transition">Sobre</a>
                <a href="contato.html" class="hover:text-red-500 transition">Contato</a>
            </nav>
        </div>
    </header>

    <section class="relative bg-zinc-900 py-16 px-6 md:px-12 flex flex-col justify-center min-h-[350px] bg-gradient-to-r from-black/80 to-zinc-900/40">
        <div class="max-w-2xl z-10">
            <span class="bg-red-600 text-xs uppercase tracking-widest font-bold px-2 py-1 rounded">Destaque</span>
            <h1 class="text-4xl md:text-5xl font-black mt-4 leading-tight">Assista ao Futebol Ao Vivo</h1>
            <p class="text-zinc-300 mt-2 text-base">Os melhores lances e transmissões completas do futebol nacional.</p>
        </div>
    </section>

    <main class="flex-grow p-6 md:p-12">
        <h2 class="text-2xl font-bold tracking-tight mb-8">Catálogo de Jogos</h2>
        <div id="gridJogos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
                <p class="text-zinc-400 mt-4 text-sm">Carregando jogos do DynamoDB...</p>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO CORRIGIDA: O SDK buscará a permissão da IAM Role automaticamente
        AWS.config.update({ region: 'us-east-1' });

        const docClient = new AWS.DynamoDB.DocumentClient();
        let todosOsJogos = [];

        window.onload = function() {
            carregarJogos();
        };

        function carregarJogos() {
            const params = {
                TableName: 'kickstream-jogos'
            };

            docClient.scan(params, function(err, data) {
                if (err) {
                    console.error("Erro ao ler do DynamoDB:", err);
                    alert("Erro ao conectar ao banco. Verifique o VPC Endpoint e a IAM Role.");
                } else {
                    console.log("Sucesso ao ler do DynamoDB!", data.Items);
                    renderizarInterface(data.Items);
                }
            });
        }

        function renderizarInterface(jogos) {
            const grid = document.getElementById('gridJogos');
            grid.innerHTML = '';

            jogos.forEach(jogo => {
                const badgeColor = jogo.status === 'Disponível' ? 'bg-green-600' : 'bg-yellow-600';
                
                grid.innerHTML += `
                    <div class="bg-zinc-950 border border-zinc-850 rounded-lg overflow-hidden flex flex-col">
                        <div class="relative aspect-video bg-zinc-900">
                            <img src="${jogo.url_thumb}" alt="${jogo.titulo}" class="w-full h-full object-cover">
                            <span class="absolute top-2 left-2 ${badgeColor} text-white font-bold text-[10px] px-2 py-0.5 rounded uppercase">${jogo.status}</span>
                        </div>
                        <div class="p-4">
                            <h4 class="font-bold text-base text-white">${jogo.titulo}</h4>
                            <p class="text-xs text-zinc-400 mt-2">${jogo.campeonato}</p>
                            <button class="w-full mt-4 bg-red-600 hover:bg-red-700 text-white text-sm font-bold py-2 rounded transition">Assistir</button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
